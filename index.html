<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Urgut Run Club</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* ═══════════════════════════════════
       TOKENS — URC Brand System
       Logodagi ranglar: qora, oq, cyan (#00C8FF), qizil (#FF3D3D)
    ═══════════════════════════════════ */
    :root {
      --bg:           #080B10;
      --bg-card:      #0F1520;
      --bg-glass:     rgba(15, 21, 32, 0.85);
      --surface:      #141C2A;
      --surface-2:    #1C2638;

      --cyan:         #00C8FF;
      --cyan-dim:     rgba(0, 200, 255, 0.12);
      --cyan-glow:    rgba(0, 200, 255, 0.35);
      --red:          #FF3D3D;
      --red-dim:      rgba(255, 61, 61, 0.12);
      --red-glow:     rgba(255, 61, 61, 0.35);

      --white:        #FFFFFF;
      --text:         #E8F0F8;
      --text-muted:   #6B7FA0;
      --text-dim:     #3A4A62;

      --gold:         #FFD700;
      --silver:       #B8C8D8;
      --bronze:       #CD8C50;

      --radius-sm:    10px;
      --radius:       16px;
      --radius-lg:    22px;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 60px;
    }

    /* ── AMBIENT GLOW ── */
    .ambient {
      position: fixed; pointer-events: none; z-index: 0;
      border-radius: 50%; filter: blur(100px);
    }
    .ambient-1 { width: 400px; height: 400px; background: rgba(0,200,255,0.06); top: -120px; right: -100px; }
    .ambient-2 { width: 300px; height: 300px; background: rgba(255,61,61,0.05); bottom: 200px; left: -80px; }

    /* ── SPLASH SCREEN ── */
    #splash {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #splash.hide { opacity: 0; transform: scale(1.04); pointer-events: none; }
    .splash-logo { font-size: 52px; animation: logo-pulse 1.4s ease-in-out infinite; }
    @keyframes logo-pulse {
      0%,100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--cyan)); }
      50%      { transform: scale(1.08); filter: drop-shadow(0 0 20px var(--cyan)); }
    }
    .splash-wordmark { font-size: 26px; font-weight: 900; letter-spacing: 3px; color: var(--white); }
    .splash-wordmark span { color: var(--cyan); }
    .splash-bar {
      width: 160px; height: 3px;
      background: var(--surface-2);
      border-radius: 99px; overflow: hidden;
    }
    .splash-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--red));
      border-radius: 99px;
      animation: splash-load 1.8s ease forwards;
    }
    @keyframes splash-load { to { width: 100%; } }

    /* ── MAIN CONTENT ── */
    #app { position: relative; z-index: 1; opacity: 0; transition: opacity 0.5s ease; }
    #app.visible { opacity: 1; }

    /* ── HEADER ── */
    .header {
      padding: 28px 20px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-left {}
    .header-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--cyan); margin-bottom: 4px;
    }
    .header-title {
      font-size: 27px; font-weight: 900; letter-spacing: -0.5px;
      line-height: 1.1; color: var(--white);
    }
    .header-title em { font-style: normal; color: var(--cyan); }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: var(--red-dim);
      border: 1px solid rgba(255,61,61,0.25);
      border-radius: 99px;
      padding: 6px 12px;
      font-size: 12px; font-weight: 700; color: var(--red);
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red);
      animation: live-blink 1.2s ease-in-out infinite;
    }
    @keyframes live-blink {
      0%,100% { opacity: 1; box-shadow: 0 0 6px var(--red); }
      50%      { opacity: 0.3; box-shadow: none; }
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; padding: 20px 20px 0;
    }
    .stat-tile {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: var(--radius);
      padding: 14px 10px;
      text-align: center;
      position: relative; overflow: hidden;
      transition: transform 0.2s;
    }
    .stat-tile::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-tile.c::before { background: linear-gradient(90deg, transparent, var(--cyan), transparent); }
    .stat-tile.r::before { background: linear-gradient(90deg, transparent, var(--red), transparent); }
    .stat-tile.w::before { background: linear-gradient(90deg, transparent, var(--white), transparent); }
    .stat-value { font-size: 19px; font-weight: 900; }
    .stat-value.c { color: var(--cyan); }
    .stat-value.r { color: var(--red); }
    .stat-value.w { color: var(--white); }
    .stat-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }

    /* ── COUNTDOWN CARD ── */
    .countdown-card {
      margin: 18px 20px 0;
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(0,200,255,0.1);
      padding: 18px 18px 16px;
      position: relative; overflow: hidden;
    }
    .countdown-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--cyan), var(--red));
    }
    .cd-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cyan); margin-bottom: 8px; }
    .cd-title { font-size: 16px; font-weight: 800; color: var(--white); margin-bottom: 12px; }
    .cd-blocks { display: flex; gap: 8px; }
    .cd-block {
      flex: 1;
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 8px 6px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .cd-num { font-size: 22px; font-weight: 900; color: var(--white); line-height: 1; font-variant-numeric: tabular-nums; }
    .cd-lbl { font-size: 9px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .cd-meta { display: flex; gap: 14px; margin-top: 12px; }
    .cd-meta-item { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
    .cd-meta-item strong { color: var(--text); font-weight: 600; }

    /* ── TABS ── */
    .tabs-wrap { padding: 18px 20px 0; }
    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 4px; gap: 4px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .tab-btn {
      flex: 1;
      background: none; border: none;
      color: var(--text-muted);
      padding: 11px 6px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700; font-size: 12px;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: all 0.22s;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--cyan-dim), rgba(255,61,61,0.08));
      color: var(--cyan);
      border: 1px solid rgba(0,200,255,0.2);
      box-shadow: 0 2px 12px rgba(0,200,255,0.1);
    }

    /* ── PODIUM ── */
    .podium-wrap {
      padding: 18px 20px 0;
      display: none;
    }
    .podium-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 12px; }
    .podium-stage {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 10px; height: 148px;
    }
    .podium-card {
      flex: 1;
      background: var(--bg-card);
      border-radius: var(--radius) var(--radius) 0 0;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
      padding: 10px 6px 14px;
      position: relative; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.04);
      border-bottom: none;
    }
    .podium-card.pos-1 { height: 100%; border-top: 2px solid var(--gold); }
    .podium-card.pos-2 { height: 82%; border-top: 2px solid var(--silver); }
    .podium-card.pos-3 { height: 70%; border-top: 2px solid var(--bronze); }
    .podium-card.empty { border-top: 2px dashed var(--surface-2); opacity: 0.35; }
    .podium-card.pos-1::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at top, rgba(255,215,0,0.06) 0%, transparent 70%);
    }
    .podium-emoji { font-size: 22px; margin-bottom: 4px; }
    .podium-name { font-size: 11px; font-weight: 700; color: var(--text); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; margin-bottom: 3px; }
    .podium-km { font-size: 14px; font-weight: 900; color: var(--cyan); }
    .podium-card.pos-1 .podium-km { color: var(--gold); }

    /* ── LEADERBOARD ── */
    .board-wrap { padding: 14px 20px 0; }
    .board-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 12px; }
    .board-list { display: flex; flex-direction: column; gap: 9px; }

    .player-row {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 13px 14px;
      display: flex; align-items: center; gap: 12px;
      border: 1px solid rgba(255,255,255,0.03);
      position: relative; overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .player-row:active { transform: scale(0.98); }
    .player-row.top1 { border-color: rgba(255,215,0,0.18); background: linear-gradient(135deg, rgba(255,215,0,0.05), var(--bg-card)); }
    .player-row.top2 { border-color: rgba(184,200,216,0.14); }
    .player-row.top3 { border-color: rgba(205,140,80,0.14); }

    .player-rank { font-size: 17px; font-weight: 900; min-width: 26px; text-align: center; }
    .player-rank.num { color: var(--text-muted); font-size: 15px; }
    .player-info { flex: 1; min-width: 0; }
    .player-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .player-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .fire-badge {
      background: rgba(255,152,0,0.14);
      color: #FF9800;
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 6px;
      white-space: nowrap;
    }
    .prog-track {
      height: 4px; background: var(--surface-2);
      border-radius: 99px; overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--cyan));
      border-radius: 99px;
      width: 0%;
      transition: width 0.8s cubic-bezier(.4,0,.2,1);
    }
    .player-row.top1 .prog-fill { background: linear-gradient(90deg, var(--gold), #FFA500); }
    .player-km { font-size: 16px; font-weight: 900; color: var(--cyan); min-width: 52px; text-align: right; }
    .player-row.top1 .player-km { color: var(--gold); }

    /* State: loading / empty */
    .state-box { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .state-icon { font-size: 32px; margin-bottom: 12px; }
    .state-text { font-size: 14px; font-weight: 600; }
    .loader {
      width: 28px; height: 28px;
      border: 3px solid var(--surface);
      border-top-color: var(--cyan);
      border-radius: 50%;
      margin: 0 auto 14px;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SHIMMER skeletons ── */
    @keyframes shimmer {
      from { background-position: -400px 0; }
      to   { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-2) 50%, var(--surface) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
      height: 66px;
    }

    /* ── SECTION DIVIDER ── */
    .section-div { height: 1px; background: rgba(255,255,255,0.04); margin: 20px 20px 0; }

    /* ── BOTTOM FOOTER ── */
    .footer {
      text-align: center;
      padding: 28px 20px 0;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }
    .footer span { color: var(--cyan); font-weight: 700; }
  </style>
</head>
<body>

<!-- ── AMBIENT ── -->
<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<!-- ── SPLASH ── -->
<div id="splash">
  <div class="splash-logo">🏔️</div>
  <div class="splash-wordmark">URGUT <span>RUN</span> CLUB</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<!-- ── APP ── -->
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="header-eyebrow">Sportiv Portal 2026</div>
      <div class="header-title">Urgut <em>Run</em> Club</div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>JONLI</div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-tile c">
      <div id="total-runners" class="stat-value c">—</div>
      <div class="stat-label">🏃 Faollar</div>
    </div>
    <div class="stat-tile r">
      <div id="total-distance" class="stat-value r">—</div>
      <div class="stat-label">🏁 Jami km</div>
    </div>
    <div class="stat-tile w">
      <div class="stat-value w">#1</div>
      <div class="stat-label">⛰ Urgut</div>
    </div>
  </div>

  <!-- COUNTDOWN -->
  <div class="countdown-card">
    <div class="cd-eyebrow">⏱ Keyingi Yig'ilish</div>
    <div id="cd-title" class="cd-title">Navbatdagi Umumiy Yig'ilish</div>
    <div class="cd-blocks">
      <div class="cd-block"><div id="cd-d" class="cd-num">00</div><div class="cd-lbl">Kun</div></div>
      <div class="cd-block"><div id="cd-h" class="cd-num">00</div><div class="cd-lbl">Soat</div></div>
      <div class="cd-block"><div id="cd-m" class="cd-num">00</div><div class="cd-lbl">Min</div></div>
      <div class="cd-block"><div id="cd-s" class="cd-num">00</div><div class="cd-lbl">Sek</div></div>
    </div>
    <div class="cd-meta">
      <div class="cd-meta-item">📍 <strong id="cd-loc">Urgut Markaziy Bog'i</strong></div>
      <div class="cd-meta-item">🕕 <strong id="cd-time">Yakshanba, 06:30</strong></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab-btn active" data-activity="run"   onclick="switchTab(this,'run')">🏃‍♂️ Yugurish</button>
      <button class="tab-btn"        data-activity="walk"  onclick="switchTab(this,'walk')">🚶‍♂️ Yurish</button>
      <button class="tab-btn"        data-activity="cycle" onclick="switchTab(this,'cycle')">🚴‍♂️ Velosiped</button>
    </div>
  </div>

  <!-- PODIUM -->
  <div class="podium-wrap" id="podium-wrap">
    <div class="podium-label">🏆 Top 3</div>
    <div class="podium-stage" id="podium-stage"></div>
  </div>

  <div class="section-div"></div>

  <!-- LEADERBOARD -->
  <div class="board-wrap">
    <div class="board-header" id="board-label">Umumiy Natijalar</div>
    <div class="board-list" id="board-list">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">© 2026 <span>Urgut Run Club</span> · Sport yangi avlod uchun</div>

</div><!-- /app -->

<script>
(() => {
  /* ── TELEGRAM INIT ── */
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.expand(); tg.setHeaderColor?.('#080B10'); tg.setBackgroundColor?.('#080B10'); }

  const API = "https://urgutrunclub-bot.onrender.com";
  const TARGET = { run: 42, walk: 50, cycle: 100 };
  let currentTab = 'run';
  let eventDate  = null;
  let cdInterval = null;

  /* ── SPLASH → APP ── */
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    document.getElementById('app').classList.add('visible');
  }, 2000);

  /* ── EVENT / COUNTDOWN ── */
  async function fetchEvent() {
    try {
      const res  = await fetch(`${API}/api/get_event`);
      const data = await res.json();
      if (data.success && data.event_date) {
        eventDate = new Date(data.event_date.replace(/-/g, '/'));
        if (data.title)     document.getElementById('cd-title').textContent = data.title;
        if (data.location)  document.getElementById('cd-loc').textContent   = data.location;
        if (data.time_text) document.getElementById('cd-time').textContent  = data.time_text;
      }
    } catch (e) { console.warn('Event fetch failed', e); }
    startCountdown();
  }

  function startCountdown() {
    if (cdInterval) clearInterval(cdInterval);
    tick();
    cdInterval = setInterval(tick, 1000);
  }

  function tick() {
    if (!eventDate) return;
    const diff = eventDate - Date.now();
    if (diff <= 0) {
      ['d','h','m','s'].forEach(k => { document.getElementById(`cd-${k}`).textContent = '00'; });
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000)  / 60000);
    const s = Math.floor((diff % 60000)    / 1000);
    const fmt = n => String(n).padStart(2,'0');
    document.getElementById('cd-d').textContent = fmt(d);
    document.getElementById('cd-h').textContent = fmt(h);
    document.getElementById('cd-m').textContent = fmt(m);
    document.getElementById('cd-s').textContent = fmt(s);
  }

  /* ── TABS ── */
  window.switchTab = (btn, activity) => {
    if (currentTab === activity) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = activity;
    loadLeaderboard();
  };

  /* ── LEADERBOARD ── */
  async function loadLeaderboard() {
    const boardList = document.getElementById('board-list');
    const podiumWrap = document.getElementById('podium-wrap');
    const stage = document.getElementById('podium-stage');

    // Skeleton shimmer
    boardList.innerHTML = `
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    `;
    podiumWrap.style.display = 'none';

    try {
      const res  = await fetch(`${API}/api/leaderboard/${currentTab}`);
      const data = await res.json();

      if (!data.success || !data.data?.length) {
        boardList.innerHTML = `
          <div class="state-box">
            <div class="state-icon">📭</div>
            <div class="state-text">Hozircha natijalar mavjud emas</div>
          </div>`;
        return;
      }

      const players = data.data;
      const target  = TARGET[currentTab];

      /* Podium */
      const podiumOrder = [1, 0, 2];
      const medals = ['🥈','🥇','🥉'];
      const posClass = ['pos-2','pos-1','pos-3'];
      stage.innerHTML = podiumOrder.map((idx, i) => {
        const p = players[idx];
        if (!p) return `<div class="podium-card ${posClass[i]} empty"></div>`;
        const name = safeName(p.name);
        return `
          <div class="podium-card ${posClass[i]}">
            <div class="podium-emoji">${medals[i]}</div>
            <div class="podium-name">${name}</div>
            <div class="podium-km">${p.distance} km</div>
          </div>`;
      }).join('');
      podiumWrap.style.display = 'block';

      /* List */
      boardList.innerHTML = '';
      players.forEach((p, idx) => {
        const name     = safeName(p.name);
        const progress = Math.min((p.distance / target) * 100, 100);
        const rankEl   = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `<span class="num">${idx+1}</span>`;
        const topClass = idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : '';
        const streak   = p.strike > 0 ? `<span class="fire-badge">🔥 ${p.strike} kun</span>` : '';

        const row = document.createElement('div');
        row.className = `player-row ${topClass}`;
        row.innerHTML = `
          <div class="player-rank">${rankEl}</div>
          <div class="player-info">
            <div class="player-name-row">
              <span class="player-name">${name}</span>${streak}
            </div>
            <div class="prog-track">
              <div class="prog-fill" data-pct="${progress}"></div>
            </div>
          </div>
          <div class="player-km">${p.distance} km</div>
        `;
        boardList.appendChild(row);
      });

      /* Animate progress bars with small delay */
      requestAnimationFrame(() => {
        boardList.querySelectorAll('.prog-fill').forEach(bar => {
          setTimeout(() => {
            bar.style.width = bar.dataset.pct + '%';
          }, 80);
        });
      });

      /* Update stats */
      document.getElementById('total-runners').textContent  = players.length;
      const totalKm = players.reduce((s, p) => s + (parseFloat(p.distance) || 0), 0);
      document.getElementById('total-distance').textContent = totalKm.toFixed(1);

    } catch (e) {
      boardList.innerHTML = `
        <div class="state-box">
          <div class="state-icon">⚡</div>
          <div class="state-text">Server bilan aloqa yo'q</div>
        </div>`;
    }
  }

  function safeName(name) {
    return (name && name !== 'null') ? name : 'Foydalanuvchi';
  }

  /* ── BOOT ── */
  fetchEvent();
  loadLeaderboard();

})();
</script>
</body>
</html>
